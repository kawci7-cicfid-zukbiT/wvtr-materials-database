name: 🧪 New Material Submission
description: Submit new WVTR/OTR material data for the community database
title: "[New Material]: "
labels: ["new-material", "pending-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing! Please paste your material JSON below.
        
        ✅ Format check:
        - name: string
        - family: string (PE, PP, PET, etc.)
        - wvtrValues: array of {value, thickness}
        - otrValues: array of {value, thickness}  
        - validConditions: array of {temperature, humidity}
  
  - type: textarea
    id: material-json
    attributes:
      label: Material JSON Data
      description: Paste the JSON exported from the app
      placeholder: |
        {
          "name": "My New Polymer",
          "family": "PE",
          "wvtrValues": [{"value": 0.5, "thickness": 100}],
          "otrValues": [{"value": 2000, "thickness": 100}],
          "validConditions": [{"temperature": 23, "humidity": 50}]
        }
    validations:
      required: true
  
  - type: input
    id: source
    attributes:
      label: Data Source (optional)
      description: Link to datasheet or publication
      placeholder: https://...
  
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: "I confirm this data is accurate and from a reliable source"
          required: true
        - label: "I agree to share this data under CC-BY-4.0 license"
          required: true
